spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5433/auth_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8083

app:
  jwt:
    secret: ${JWT_SECRET:northern-super-secret-key-change-this-in-production-32chars}
    expiration-ms: 604800000  # 7 days in milliseconds
  google:
    client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
